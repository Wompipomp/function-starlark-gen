name: Update K8s Schemas

on:
  workflow_dispatch:
    inputs:
      k8s_version:
        description: 'Kubernetes version (e.g., 1.31)'
        required: true
        type: string
      package_name:
        description: 'OCI package name for load() paths'
        required: false
        default: 'schemas-k8s'
        type: string
      output_dir:
        description: 'Output directory for generated files'
        required: false
        default: './schemas/k8s'
        type: string
      starlark_gen_version:
        description: 'starlark-gen version to install (e.g., v0.1.0)'
        required: false
        default: 'latest'
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install starlark-gen
        run: go install github.com/wompipomp/starlark-gen@${{ inputs.starlark_gen_version }}

      - name: Download swagger.json
        run: >-
          curl -fsSL -o swagger.json
          "https://raw.githubusercontent.com/kubernetes/kubernetes/v${{ inputs.k8s_version }}.0/api/openapi-spec/swagger.json"

      - name: Generate schemas
        run: >-
          starlark-gen k8s swagger.json
          --package "${{ inputs.package_name }}:v${{ inputs.k8s_version }}"
          --output "${{ inputs.output_dir }}"

      - name: Clean up
        run: rm swagger.json

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          commit-message: 'chore: update K8s schemas to v${{ inputs.k8s_version }}'
          title: 'Update K8s schemas to v${{ inputs.k8s_version }}'
          body: 'Auto-generated by starlark-gen from K8s v${{ inputs.k8s_version }} swagger.json'
          branch: 'update-k8s-schemas-v${{ inputs.k8s_version }}'
