name: Update Provider Schemas

on:
  workflow_dispatch:
    inputs:
      provider_name:
        description: 'Provider name (e.g., provider-aws-s3)'
        required: true
        type: string
      provider_version:
        description: 'Provider version (e.g., 1.14)'
        required: true
        type: string
      provider_source_url:
        description: 'Custom URL for CRD download (default: Upbound GitHub releases)'
        required: false
        default: ''
        type: string
      package_name:
        description: 'OCI package name (default: schemas-{provider_name})'
        required: false
        default: ''
        type: string
      output_dir:
        description: 'Output directory (default: ./schemas/{provider_name})'
        required: false
        default: ''
        type: string
      starlark_gen_version:
        description: 'starlark-gen version to install (e.g., v0.1.0)'
        required: false
        default: 'latest'
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install starlark-gen
        run: go install github.com/wompipomp/starlark-gen@${{ inputs.starlark_gen_version }}

      - name: Set defaults
        run: |
          PACKAGE_NAME="${{ inputs.package_name }}"
          if [ -z "$PACKAGE_NAME" ]; then
            PACKAGE_NAME="schemas-${{ inputs.provider_name }}"
          fi
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> "$GITHUB_ENV"

          OUTPUT_DIR="${{ inputs.output_dir }}"
          if [ -z "$OUTPUT_DIR" ]; then
            OUTPUT_DIR="./schemas/${{ inputs.provider_name }}"
          fi
          echo "OUTPUT_DIR=$OUTPUT_DIR" >> "$GITHUB_ENV"

      - name: Download CRDs
        run: |
          if [ -n "${{ inputs.provider_source_url }}" ]; then
            curl -fsSL -o crds.yaml "${{ inputs.provider_source_url }}"
          else
            mkdir -p crds
            gh release download "v${{ inputs.provider_version }}" \
              --repo "upbound/${{ inputs.provider_name }}" \
              --pattern "*.yaml" \
              --dir crds/
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate schemas
        run: |
          if [ -f crds.yaml ]; then
            starlark-gen provider crds.yaml \
              --package "$PACKAGE_NAME:v${{ inputs.provider_version }}" \
              --output "$OUTPUT_DIR"
          else
            starlark-gen provider crds/*.yaml \
              --package "$PACKAGE_NAME:v${{ inputs.provider_version }}" \
              --output "$OUTPUT_DIR"
          fi

      - name: Clean up
        run: rm -rf crds/ crds.yaml

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          commit-message: 'chore: update ${{ inputs.provider_name }} schemas to v${{ inputs.provider_version }}'
          title: 'Update ${{ inputs.provider_name }} schemas to v${{ inputs.provider_version }}'
          body: 'Auto-generated by starlark-gen from ${{ inputs.provider_name }} v${{ inputs.provider_version }} CRDs'
          branch: 'update-${{ inputs.provider_name }}-schemas-v${{ inputs.provider_version }}'
