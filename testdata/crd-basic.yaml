apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: widgets.example.com
spec:
  group: example.com
  names:
    kind: Widget
    plural: widgets
    singular: widget
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - size
              properties:
                size:
                  type: string
                  enum:
                    - small
                    - medium
                    - large
                  default: medium
                replicas:
                  type: integer
                  default: 3
                enabled:
                  type: boolean
                  default: true
                config:
                  type: object
                  properties:
                    timeout:
                      type: string
                    retries:
                      type: integer
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Running
                    - Failed
                message:
                  type: string
