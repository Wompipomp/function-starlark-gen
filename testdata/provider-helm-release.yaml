# Synthetic Crossplane provider CRD modeling provider-helm Release (forProvider only, no initProvider)
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: releases.helm.crossplane.io
spec:
  group: helm.crossplane.io
  names:
    kind: Release
    plural: releases
    singular: release
  scope: Cluster
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - forProvider
              properties:
                deletionPolicy:
                  type: string
                  enum:
                    - Delete
                    - Orphan
                forProvider:
                  type: object
                  description: Parameters for the Helm Release
                  properties:
                    chart:
                      type: object
                      properties:
                        name:
                          type: string
                        version:
                          type: string
                    namespace:
                      type: string
                    values:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                providerConfigRef:
                  type: object
                  properties:
                    name:
                      type: string
                    policy:
                      type: object
                      properties:
                        resolve:
                          type: string
                  required:
                    - name
                writeConnectionSecretToRef:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
            status:
              type: object
              properties:
                atProvider:
                  type: object
                  properties:
                    state:
                      type: string
                    revision:
                      type: integer
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
