apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: alphas.example.com
spec:
  group: example.com
  names:
    kind: Alpha
    plural: alphas
    singular: alpha
  scope: Namespaced
  versions:
