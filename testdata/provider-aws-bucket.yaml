# Synthetic Crossplane provider CRD modeling provider-upjet-aws S3 Bucket
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: buckets.s3.aws.upbound.io
spec:
  group: s3.aws.upbound.io
  names:
    kind: Bucket
    plural: buckets
    singular: bucket
  scope: Cluster
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - forProvider
              properties:
                deletionPolicy:
                  type: string
                  enum:
                    - Delete
                    - Orphan
                  default: Delete
                forProvider:
                  type: object
                  description: Parameters for the Bucket resource
                  properties:
                    region:
                      type: string
                      description: Region is the region you'd like the bucket to be created in.
                    tags:
                      type: object
                      additionalProperties:
                        type: string
                initProvider:
                  type: object
                  description: InitProvider holds the same fields as ForProvider minus identifier fields
                  properties:
                    tags:
                      type: object
                      additionalProperties:
                        type: string
                managementPolicies:
                  type: array
                  items:
                    type: string
                  default:
                    - "*"
                providerConfigRef:
                  type: object
                  description: ProviderConfigReference specifies how the provider should be configured.
                  properties:
                    name:
                      type: string
                    policy:
                      type: object
                      properties:
                        resolve:
                          type: string
                  required:
                    - name
                writeConnectionSecretToRef:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                publishConnectionDetailsTo:
                  type: object
                  properties:
                    name:
                      type: string
            status:
              type: object
              properties:
                atProvider:
                  type: object
                  properties:
                    arn:
                      type: string
                    bucketDomainName:
                      type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
